# CWE → AIDEFEND tactic/pillar/phase bridge table
#
# Each entry maps a CWE ID to AIDEFEND tactic *hints* (not authoritative
# mappings). The bridge runs after entity extraction; results populate
# GapReport.bridge_rationales / suggested_pillars / suggested_phases /
# suggested_tactic_ids.
#
# Field meanings:
#   cwe_id: canonical "CWE-NNN" form
#   pillar: subset of {app, data, infra, model}
#   phase: subset of {building, operation, validation}
#   suggested_tactic_ids: subset of {model, harden, detect, isolate, deceive, evict, restore}
#   rationale: one-line "X because Y" so review queue is auditable
#   confidence: 0..1 (heuristic only; reviewer override expected)
#   source: citation URL (CWE definition is the default; AI-specific CWEs cite NIST/OWASP)
#
# Confidence calibration:
#   0.85+ — direct mechanism overlap (e.g., CWE-1427 prompt injection → harden)
#   0.70  — strong but transitive (e.g., CWE-78 command injection → harden+isolate)
#   0.55  — class-level (e.g., CWE-20 input validation → harden)
#
# Maintenance: add entries via PR; reviewer must confirm citation and
# rationale. Avoid adding speculative CWEs — empty table is better than
# noisy one. Refresh this file as part of the QUALITY_AUDIT_CHECKLIST.

